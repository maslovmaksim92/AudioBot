[general]
static=yes
writeprotect=no
clearglobalvars=no

; ========================================
; Context: default
; General dialplan and echo test
; ========================================

[default]
; Echo test extension
exten => 8888,1,Answer()
 same => n,NoOp(Echo test)
 same => n,Echo()
 same => n,Hangup()

; Direct outbound calls to PSTN via Novofon
exten => _X.,1,NoOp(Direct to PSTN: ${EXTEN})
 same => n,Set(CALLERID(num)=79843330712)
 same => n,Dial(PJSIP/${EXTEN}@novofon-endpoint,60)
 same => n,Hangup()

; ========================================
; Context: from-novofon
; Inbound calls from Novofon
; ========================================

[from-novofon]
exten => _X.,1,NoOp(Inbound from Novofon: ${EXTEN})
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()

; ========================================
; Context: from-livekit
; Calls from LiveKit (AI Agent)
; ========================================

[from-livekit]
; Echo test for debugging
exten => 8888,1,NoOp(LiveKit Echo Test)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; Real phone numbers - route through Novofon to PSTN
exten => _7XXXXXXXXXX,1,NoOp(LiveKit AI call to: ${EXTEN})
 same => n,Set(CALLERID(num)=79843330712)
 same => n,Set(CALLERID(name)=VasDom AI)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Dial(PJSIP/${EXTEN}@novofon-endpoint,60)
 same => n,Hangup()

; International format +7
exten => _+7XXXXXXXXXX,1,NoOp(LiveKit AI call to: ${EXTEN})
 same => n,Set(PHONENUM=${EXTEN:1})
 same => n,Set(CALLERID(num)=79843330712)
 same => n,Set(CALLERID(name)=VasDom AI)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Dial(PJSIP/${PHONENUM}@novofon-endpoint,60)
 same => n,Hangup()

; Fallback for any other number format
exten => _X.,1,NoOp(LiveKit AI call (fallback): ${EXTEN})
 same => n,Set(CALLERID(num)=79843330712)
 same => n,Set(CALLERID(name)=VasDom AI)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Dial(PJSIP/${EXTEN}@novofon-endpoint,60)
 same => n,Hangup()