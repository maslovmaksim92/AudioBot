; =============================================================================
; VasDom Asterisk dialplan (READY TO COPY)
; How to apply on server:
;   sudo -s
;   nano /etc/asterisk/extensions.conf
;   (paste everything below)
;   asterisk -rx "core restart now"
; =============================================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

; -----------------------------------------------------------------------------
; Default context
; - 8888: echo test (quick media/RTP check)
; - _X.: route to PSTN via Novofon using confirmed CallerID (E.164)
; -----------------------------------------------------------------------------
[default]
exten => 8888,1,Answer()
 same => n,NoOp(Echo test)
 same => n,Echo()
 same => n,Hangup()

; Catch-all numbers: send externally via Novofon
exten => _X.,1,NoOp(From default to PSTN: ${EXTEN})
 same => n,Set(CALLERID(num)=79843330712)
 ; IMPORTANT: number must be in R-URI => use PJSIP/${EXTEN}@novofon-endpoint
 same => n,Dial(PJSIP/${EXTEN}@novofon-endpoint,60)
 same => n,Hangup()

; -----------------------------------------------------------------------------
; Inbound from Novofon (route all to 8888 for initial tests)
; -----------------------------------------------------------------------------
[from-novofon]
exten => _X.,1,NoOp(Inbound from Novofon: ${EXTEN})
 same => n,Goto(default,8888,1)

; -----------------------------------------------------------------------------
; From LiveKit: test 8888 locally, and route external numbers via Novofon
; -----------------------------------------------------------------------------
[from-livekit]
; Test echo
exten => 8888,1,Goto(default,8888,1)
 same => n,Hangup()

; Outgoing PSTN
exten => _X.,1,NoOp(From LiveKit to PSTN: ${EXTEN})
 same => n,Set(CALLERID(num)=79843330712)
 ; IMPORTANT: number must be in R-URI => use PJSIP/${EXTEN}@novofon-endpoint
 same => n,Dial(PJSIP/${EXTEN}@novofon-endpoint,60)
 same => n,Hangup()

; -----------------------------------------------------------------------------
; Confirm trunk helper (used once to confirm SIP Trunk IP by calling 8888)
; Run from CLI: channel originate Local/start@confirm-trunk application Wait 12
; -----------------------------------------------------------------------------
[confirm-trunk]
exten => start,1,NoOp(Confirm Novofon SIP Trunk)
 same => n,Set(CALLERID(num)=79843330712)
 same => n,Dial(PJSIP/novofon-8888-endpoint,12)
 same => n,Hangup()
