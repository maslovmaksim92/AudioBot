; =============================================================================
; VasDom Asterisk dialplan (WORKING – full copy/paste)
; How to apply on server:
;   sudo -s
;   nano /etc/asterisk/extensions.conf
;   (paste everything below)
;   asterisk -rx "core restart now"
; =============================================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

; -----------------------------------------------------------------------------
; Default – echo test and catch-all PSTN
; -----------------------------------------------------------------------------
[default]
exten => 8888,1,Answer()
 same => n,NoOp(Echo test)
 same => n,Echo()
 same => n,Hangup()

; Catch-all to PSTN via Novofon
exten => _X.,1,NoOp(From default to PSTN: ${EXTEN})
 same => n,Set(CALLERID(num)=79843330712)
 ; Force number into Request-URI explicitly (proven working)
 same => n,Dial(PJSIP/novofon-endpoint/sip:${EXTEN}@sip.novofon.ru:5060,60)
 same => n,Hangup()

; -----------------------------------------------------------------------------
; Inbound from Novofon – route to echo for tests
; -----------------------------------------------------------------------------
[from-novofon]
exten => _X.,1,NoOp(Inbound from Novofon: ${EXTEN})
 same => n,Goto(default,8888,1)

; -----------------------------------------------------------------------------
; From LiveKit – echo and PSTN out via Novofon
; -----------------------------------------------------------------------------
[from-livekit]
; Echo test
exten => 8888,1,Goto(default,8888,1)
 same => n,Hangup()

; Outgoing to PSTN – explicit SIP URI so R-URI contains the number
exten => _X.,1,NoOp(From LiveKit to PSTN: ${EXTEN})
 same => n,Set(CALLERID(num)=79843330712)
 same => n,Dial(PJSIP/novofon-endpoint/sip:${EXTEN}@sip.novofon.ru:5060,60)
 same => n,Hangup()

; -----------------------------------------------------------------------------
; Trunk confirmation helper (call 8888)
; -----------------------------------------------------------------------------
[confirm-trunk]
exten => start,1,NoOp(Confirm Novofon SIP Trunk)
 same => n,Set(CALLERID(num)=79843330712)
 same => n,Dial(PJSIP/novofon-8888-endpoint,12)
 same => n,Hangup()
