; =============================================================================
; Asterisk logger.conf (QUIET CONSOLE)
; Copy to /etc/asterisk/logger.conf and reload:
;   sudo -s
;   cp /etc/asterisk/logger.conf /etc/asterisk/logger.conf.bak
;   nano /etc/asterisk/logger.conf  (paste all)
;   asterisk -rx "logger reload"
; =============================================================================
[general]
dateformat=%F %T
[logfiles]
console => warning,error
messages => notice,warning,error
