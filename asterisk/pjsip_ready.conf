[global]
type=global
user_agent=Asterisk VasDom AI

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=51.250.74.43
external_signaling_address=51.250.74.43
allow_reload=yes

; ========================================
; Novofon SIP Trunk Configuration
; ========================================

[novofon-auth]
type=auth
auth_type=userpass
username=0015360
password=_e2WqAsgun

[novofon-aor]
type=aor
contact=sip:sip.novofon.ru:5060

[novofon-endpoint]
type=endpoint
transport=transport-udp
context=from-novofon
disallow=all
allow=alaw,ulaw
outbound_auth=novofon-auth
aors=novofon-aor
from_domain=sip.novofon.ru
from_user=0015360
dtmf_mode=rfc4733
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
timers=yes

[novofon-reg]
type=registration
transport=transport-udp
outbound_auth=novofon-auth
server_uri=sip:sip.novofon.ru:5060
client_uri=sip:0015360@sip.novofon.ru
contact_user=0015360
retry_interval=60
forbidden_retry_interval=600
expiration=3600

[novofon-identify]
type=identify
endpoint=novofon-endpoint
match=sip.novofon.ru

; ========================================
; LiveKit SIP Endpoint (for AI calls)
; ========================================

[livekit-endpoint]
type=endpoint
transport=transport-udp
context=from-livekit
disallow=all
allow=alaw,ulaw,opus
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
timers=yes
media_encryption=no
dtmf_mode=rfc4733

[livekit-identify]
type=identify
endpoint=livekit-endpoint
; LiveKit Cloud IP ranges - adjust as needed
match=161.115.0.0/16
match=35.0.0.0/8