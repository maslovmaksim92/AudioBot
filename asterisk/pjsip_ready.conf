; =============================================================================
; VasDom Asterisk PJSIP (READY TO COPY)
; How to apply on server:
;   sudo -s
;   nano /etc/asterisk/pjsip.conf
;   (paste everything below)
;   asterisk -rx "core restart now"
; =============================================================================

[global]
type=global
user_agent=Asterisk VasDom

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=51.250.74.43
external_signaling_address=51.250.74.43
allow_reload=yes

[novofon-auth]
type=auth
auth_type=userpass
username=0015360
password="_e2WqAsgun"

[novofon-aor]
type=aor
contact=sip:sip.novofon.ru:5060

[novofon-endpoint]
type=endpoint
transport=transport-udp
context=from-novofon
disallow=all
allow=alaw,ulaw
outbound_auth=novofon-auth
aors=novofon-aor
from_domain=sip.novofon.ru
from_user=0015360
dtmf_mode=rfc4733
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
timers=yes
; ВАЖНО: НЕ включать outbound_proxy — иначе снова будет 484
; outbound_proxy=sip:sip.novofon.ru:5060;lr

[novofon-reg]
type=registration
transport=transport-udp
outbound_auth=novofon-auth
server_uri=sip:sip.novofon.ru:5060
client_uri=sip:0015360@sip.novofon.ru
contact_user=0015360
retry_interval=60
forbidden_retry_interval=600
expiration=3600

[novofon-identify]
type=identify
endpoint=novofon-endpoint
match=sip.novofon.ru
match=37.139.38.224
match=37.139.38.229
match=37.139.38.231
match=37.139.38.53
match=37.139.38.54

[livekit-endpoint]
type=endpoint
transport=transport-udp
context=from-livekit
disallow=all
allow=alaw,ulaw,opus
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
timers=yes

; Временный помощник для 8888 (можно удалить позже)
[novofon-8888-aor]
type=aor
contact=sip:8888@sip.novofon.ru:5060

[novofon-8888-endpoint]
type=endpoint
transport=transport-udp
context=from-novofon
disallow=all
allow=alaw,ulaw
aors=novofon-8888-aor
from_domain=sip.novofon.ru
from_user=79843330712
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
timers=yes
trust_id_outbound=yes
send_pai=yes
user_eq_phone=yes